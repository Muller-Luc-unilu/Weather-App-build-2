name: Maven CI + CD

on:
  push:
    branches: [ main ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main ]

env:
  JDK_DIST: 'temurin'
  JDK_VERSION: '25'

jobs:

  build-test-package-store:
    name: Build, test, and store package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JDK_DIST }} version ${{ env.JDK_VERSION }} and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JDK_DIST }}
          java-version: ${{ env.JDK_VERSION }}
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn --batch-mode checkstyle:check

      - name: Build, test, and package with Maven
        run: mvn --batch-mode --update-snapshots clean verify

      - name: Verify shaded JAR exists
        run: ls -lh target/*.jar

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload (store) JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-ci-jar
          path: target/*.jar

  build-test-store-release:
    name: Build, test, store, and release JAR
    runs-on: ubuntu-latest
    needs: build-test-package-store
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JDK_DIST }} version ${{ env.JDK_VERSION }} and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JDK_DIST }}
          java-version: ${{ env.JDK_VERSION }}
          cache: 'maven'

      - name: Build, test, and package with Maven
        run: mvn --batch-mode --update-snapshots clean verify

      - name: Upload (store) JAR artifact to allow later download
        uses: actions/upload-artifact@v7
        with:
          name: release-jar
          path: target/*.jar
  deploy-site:
    name: Build and deploy Maven site
    runs-on: ubuntu-latest
    needs: build-test-package-store

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JDK_DIST }} version ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JDK_DIST }}
          java-version: ${{ env.JDK_VERSION }}
          cache: 'maven'

      - name: Build Maven site
        run: mvn --batch-mode site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Release to GitHub and upload JAR asset
        uses: softprops/action-gh-release@v3
        with:
          files: target/*.jar
